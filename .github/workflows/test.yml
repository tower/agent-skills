name: Validate skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run validation tests
        run: uv run pytest
      - name: Run skills CLI integration test
        run: uv run pytest -m integration
